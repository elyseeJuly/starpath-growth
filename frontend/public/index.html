<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPath - ASD社会化辅助支持系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .role-btn.active {
            border-color: #667eea;
            background: #f8f6ff;
        }
        .role-btn .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .role-btn .label {
            font-size: 12px;
            color: #666;
        }
        .features {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .features h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #666;
        }
        .feature-item span {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🌟 StarPath</h1>
            <p>ASD社会化辅助支持系统</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>

            <div class="form-group">
                <label>选择角色</label>
                <div class="role-selector">
                    <div class="role-btn active" data-role="patient">
                        <div class="icon">🧑</div>
                        <div class="label">患者</div>
                    </div>
                    <div class="role-btn" data-role="parent">
                        <div class="icon">👨</div>
                        <div class="label">家长</div>
                    </div>
                    <div class="role-btn" data-role="teacher">
                        <div class="icon">👩</div>
                        <div class="label">老师</div>
                    </div>
                    <div class="role-btn" data-role="admin">
                        <div class="icon">👤</div>
                        <div class="label">管理员</div>
                    </div>
                </div>
                <select id="roleSelect" style="display:none">
                    <option value="patient">患者</option>
                    <option value="parent">家长</option>
                    <option value="teacher">康复老师</option>
                    <option value="admin">管理员</option>
                </select>
            </div>

            <button type="submit" class="btn">登 录</button>
        </form>

        <div class="features">
            <h3>✨ 系统功能</h3>
            <div class="feature-item"><span>🧠</span> 能力画像评估</div>
            <div class="feature-item"><span>☕</span> 咖啡馆岗位适应</div>
            <div class="feature-item"><span>🎮</span> 场景模拟训练</div>
            <div class="feature-item"><span>📊</span> 数据分析统计</div>
        </div>
    </div>

    <script>
        let selectedRole = 'patient';

        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.dataset.role;
                document.getElementById('roleSelect').value = selectedRole;
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // 保存登录信息到 localStorage
            localStorage.setItem('starpath_user', JSON.stringify({
                username,
                role: selectedRole,
                name: username,
                loginTime: new Date().toISOString()
            }));

            // 跳转到仪表板
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
